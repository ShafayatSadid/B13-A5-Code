<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Home</title>

    <!-- daisyUI and Tailwind cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- css connection -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="p-3">

    <!-- header -->
    <header>

        <nav>

            <div class="navbar bg-base-100 shadow-sm flex justify-between gap-3 flex-wrap">

                <div class="flex items-center gap-2 md:ml-[80px]">
                    <img class="w-9" src="./assets/github-logo.png" alt="">
                    <h3 class="text-[1.5rem] font-semibold">GitHub Issues Tracker</h3>
                </div>
                <div class="flex gap-2 md:mr-12">
                    <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                    <button class="btn btn-primary">Search</button>
                </div>
            </div>
        </nav>
    </header>

    <!-- main -->
    <main class="max-w-[1110px] mx-auto my-[60px]">

        <!-- tab section -->
        <section class="shadow-sm p-4 rounded-lg border border-[#E4E4E7] flex flex-wrap gap-3">

            <button id="tab1" onclick="tab('tab1')" class="tab-btn btn active w-[120px] py-3 text-[#64748B] bg-[#FFFFFF] border border-[#E4E4E7]">All</button>

            <button id="tab2" onclick="tab('tab2')" class="tab-btn btn w-[120px] py-3 text-[#64748B] bg-[#FFFFFF] border border-[#E4E4E7]">Open</button>

            <button id="tab3" onclick="tab('tab3')" class="tab-btn btn w-[120px] py-3 text-[#64748B] bg-[#FFFFFF] border border-[#E4E4E7]">Closed</button>
        </section>

        <!-- Issue section -->
        <section class="my-4">

            <!-- issue header -->
            <section class="shadow-sm py-3 px-6 rounded-lg space-x-2 flex justify-between border border-[#E4E4E7]">

                <!-- content -->
                <div class="flex items-center gap-2">
                    <div><img src="./assets/Aperture.png" alt=""></div>
                    <div>
                        <h2 class="text-[1.125rem] font-semibold text-[#1F2937]">
                            <span id="all-issue" class="issue-count"></span>
                            <span id="open-issue" class="issue-count hidden"></span>
                            <span id="closed-issue" class="issue-count hidden"></span> Issues</h2>
                            
                        <p class="text-[1rem] text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>

                <!-- open closed -->
                <div class="flex items-center gap-4">

                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-[#00A96E] rounded-full"></span>
                        <span>Open</span>
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-[#A855F7] rounded-full"></span>
                        <span>Closed</span>
                    </div>
                </div>
            </section>

            <!-- issue card -->
            <!-- All section -->
            <section id="all-section" class="issue-section bg-[#FBFBFB] p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">

                <!-- card -->
                <div class="card w-[256px] p-4 shadow-sm space-y-3">

                    <!-- status and priority -->
                    <div class="flex justify-between">
                        <img class="w-6 h-6" src="./assets/Open-Status.png" alt="">
                        <button
                            class="text-[0.75rem] text-[#EF4444] w-[80px] py-[5px] rounded-[100px] bg-[#FEECEC]">High</button>
                    </div>

                    <!-- title -->
                    <div class="space-y-2">
                        <h4 class="text-[0.875rem] font-semibold text-[#1F2937]">Fix navigation menu on mobile devices
                        </h4>
                        <p class="text-[0.75rem] text-[#64748B">The navigation menu doesn't collapse properly on mobile
                            devices...</p>
                    </div>

                    <!-- labels -->
                    <div class="flex items-center gap-2">
                        <button
                            class="text-[0.75rem] flex items-center gap-1 text-[#EF4444] p-[5px] rounded-[100px] bg-[#FEECEC]"><img
                                class="w-3 h-3" src="./assets/bug.png" alt=""> BUG</button>

                        <button
                            class="text-[0.75rem] flex items-center gap-1 text-[#D97706] p-[5px] rounded-[100px] bg-[#FFF8DB]"><img
                                class="w-3 h-3" src="./assets/help.png" alt=""> HELP WANTED</button>
                    </div>

                    <!-- author -->
                    <div class="p-4 border-t border-[#E4E4E7]">

                        <div>
                            <p class="text-[0.75rem] text-[#64748B]">#1by john_doe</p>
                            <p class="text-[0.75rem] text-[#64748B]">1/15/2024</p>
                        </div>
                    </div>
                </div>

            </section>


            <!-- issue card -->
            <!-- Open section -->
            <section id="open-section" class="issue-section bg-[#FBFBFB] p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 hidden"></section>

            <!-- issue card -->
            <!-- Closed section -->
            <section id="closed-section" class="issue-section bg-[#FBFBFB] p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 hidden"></section>
        </section>


        
    </main>

    <!-- js file -->
    <script src="./js/machine.js"></script>
    <script src="./js/home.js"></script>
</body>

</html>
